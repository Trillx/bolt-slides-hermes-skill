name: Validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Static validation (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 8
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install ShellCheck on macOS
        if: runner.os == 'macOS'
        run: brew install shellcheck
      - name: Validate package
        run: bash tests/validate.sh

  end-to-end:
    name: End-to-end (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Install ShellCheck on macOS
        if: runner.os == 'macOS'
        run: brew install shellcheck
      - name: Exercise initialization, negative gates, build, audits, and capture
        env:
          BOLT_SLIDES_RUN_E2E: '1'
          BOLT_SLIDES_CAPTURE_PORT: '43173'
          BOLT_SLIDES_PORT_COLLISION_TEST: '43174'
        run: bash tests/validate.sh
